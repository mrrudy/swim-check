# OpenAPI Contract: Scraping Status View
# Feature Branch: 006-scraping-status-view
# Date: 2026-02-06
#
# This contract documents the API endpoint extension for the Scraping Status View.
# It extends the existing /admin/scheduler/status endpoint.

openapi: 3.0.3
info:
  title: Swim Check API - Scraping Status Extension
  description: |
    API contract extension for the Scraping Status View feature.
    Extends the existing admin scheduler status endpoint with additional fields.
  version: 1.1.0
  contact:
    name: Swim Check

servers:
  - url: http://localhost:3001/api/v1
    description: Local development server

paths:
  /admin/scheduler/status:
    get:
      summary: Get scheduler status with pool scraping details
      description: |
        Returns the current scheduler state and detailed scraping status for each
        configured pool. Extended in v1.1.0 to include full timestamps, error
        messages, and source URLs.
      operationId: getSchedulerStatus
      tags:
        - Admin
      responses:
        '200':
          description: Scheduler status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulerStatusResponse'
              example:
                isRunning: true
                nextScheduledRun: "2026-02-07T00:00:00.000Z"
                lastRunTimestamp: "2026-02-06T00:00:00.000Z"
                poolStatuses:
                  - poolId: "00000000-0000-0000-0000-000000000002"
                    poolName: "Aquapark Wrocław - Borowska"
                    lastScrapeDate: "2026-02-06"
                    lastScrapeTimestamp: "2026-02-06T00:05:23.456Z"
                    lastScrapeStatus: "success"
                    lastErrorMessage: null
                    inProgress: false
                    sourceUrls:
                      - url: "https://aquapark.wroc.pl/pl/grafik-rezerwacji-basenu-sportowego"
                        label: "Schedule Page"
                  - poolId: "00000000-0000-0000-0000-000000000003"
                    poolName: "Centrum Śleża"
                    lastScrapeDate: "2026-02-05"
                    lastScrapeTimestamp: "2026-02-05T00:03:12.789Z"
                    lastScrapeStatus: "failure"
                    lastErrorMessage: "NETWORK: Connection timeout after 30000ms"
                    inProgress: false
                    sourceUrls:
                      - url: "https://www.centrumsleza.pl/grafiki/"
                        label: "Schedule Page"
                      - url: "https://docs.google.com/spreadsheets/d/13tqiOBZubRID83MU6suo7ZyfvCQfjP-p9Z1vaozmioE"
                        label: "Google Sheets"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  schemas:
    SchedulerStatusResponse:
      type: object
      description: Complete scheduler and pool scraping status
      required:
        - isRunning
        - nextScheduledRun
        - lastRunTimestamp
        - poolStatuses
      properties:
        isRunning:
          type: boolean
          description: Whether the scheduler is currently active
          example: true
        nextScheduledRun:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of next scheduled run
          example: "2026-02-07T00:00:00.000Z"
        lastRunTimestamp:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of last scheduler run
          example: "2026-02-06T00:00:00.000Z"
        poolStatuses:
          type: array
          description: Scraping status for each configured pool
          items:
            $ref: '#/components/schemas/PoolScrapeStatusResponse'

    PoolScrapeStatusResponse:
      type: object
      description: Scraping status for a single pool
      required:
        - poolId
        - poolName
        - lastScrapeDate
        - lastScrapeTimestamp
        - lastScrapeStatus
        - lastErrorMessage
        - inProgress
        - sourceUrls
      properties:
        poolId:
          type: string
          format: uuid
          description: Unique pool identifier
          example: "00000000-0000-0000-0000-000000000002"
        poolName:
          type: string
          description: Display name of the pool
          example: "Aquapark Wrocław - Borowska"
        lastScrapeDate:
          type: string
          format: date
          nullable: true
          description: Date of last scrape (YYYY-MM-DD)
          example: "2026-02-06"
        lastScrapeTimestamp:
          type: string
          format: date-time
          nullable: true
          description: |
            Full ISO 8601 timestamp of last scrape attempt.
            NEW in v1.1.0 - provides time precision for "X hours ago" display.
          example: "2026-02-06T00:05:23.456Z"
        lastScrapeStatus:
          type: string
          enum: [success, failure]
          nullable: true
          description: Result of last scrape attempt
          example: "success"
        lastErrorMessage:
          type: string
          nullable: true
          description: |
            Error message from last failed scrape.
            NEW in v1.1.0 - enables error details display in UI.
          example: "NETWORK: Connection timeout after 30000ms"
        inProgress:
          type: boolean
          description: Whether scraping is currently in progress for this pool
          example: false
        sourceUrls:
          type: array
          description: |
            URLs used by the scraper to fetch pool data.
            NEW in v1.1.0 - enables clickable source links in UI.
          items:
            $ref: '#/components/schemas/SourceLink'

    SourceLink:
      type: object
      description: A URL used for scraping pool data
      required:
        - url
        - label
      properties:
        url:
          type: string
          format: uri
          description: The source URL
          example: "https://aquapark.wroc.pl/pl/grafik-rezerwacji-basenu-sportowego"
        label:
          type: string
          maxLength: 50
          description: Human-readable label for the link
          example: "Schedule Page"

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          example: "INTERNAL_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "An unexpected error occurred"
        details:
          type: object
          additionalProperties: true
          description: Additional error context

tags:
  - name: Admin
    description: Administrative operations and monitoring
